<script>

async function liveMKS(){

try{

let response = await fetch("https://api.allorigins.win/raw?url=https://www.mkspamp.com.my/pricing");

let html = await response.text();

/* cari harga 1 kilo */

let match = html.match(/EMAS : 1 KILO[^0-9]*([0-9 ]+)/);

let kilo = match[1].replace(/ /g,"");

let base = kilo/1000;

/* kira harga */

document.getElementById("g9999").innerHTML="RM "+base.toFixed(2)+"/g";

document.getElementById("g999").innerHTML="RM "+(base*0.999).toFixed(2)+"/g";

document.getElementById("g916").innerHTML="RM "+((base*0.916)-10).toFixed(2)+"/g";

document.getElementById("g835").innerHTML="RM "+((base*0.835)-30).toFixed(2)+"/g";

document.getElementById("g750").innerHTML="RM "+((base*0.750)-30).toFixed(2)+"/g";

document.getElementById("g585").innerHTML="RM "+((base*0.585)-30).toFixed(2)+"/g";

document.getElementById("g375").innerHTML="RM "+((base*0.375)-30).toFixed(2)+"/g";

}catch{

document.getElementById("g9999").innerHTML="Error";

}

}

liveMKS();

/* update setiap 10 saat */

setInterval(liveMKS,10000);

</script>
