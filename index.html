<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYNGOLD MKS LIVE</title>

<style>
body{margin:0;background:#000;color:#ffd700;font-family:Arial;text-align:center;}

.box{
width:92%;max-width:420px;margin:20px auto;padding:15px;
border-radius:18px;background:#000;
box-shadow:0 0 15px gold,0 0 40px gold;
}

.mode{font-size:12px;margin:6px 0;}
.public{color:#ccc;}
.agent{color:#ff7675;}

.row{
display:flex;justify-content:space-between;
padding:10px;border-bottom:1px solid #333;
}

.up{color:#00ff90;}
.down{color:#ff4d4d;}
.strike{color:#888;text-decoration:line-through;font-size:12px;margin-right:6px;}

.result{
margin-top:10px;background:#ffd700;color:#000;
padding:12px;border-radius:10px;font-size:22px;
}

button{
margin-top:8px;padding:10px 18px;border:none;border-radius:8px;color:#fff;
}
.refresh{background:#2ecc71;}
.agentBtn{background:#e67e22;}

input,select{
width:85%;padding:10px;margin-top:10px;border-radius:10px;border:none;text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2>HYNGOLD</h2>
<div id="status">Connecting MKS...</div>
<div id="spot"></div>
<div id="lastUpdate"></div>

<div class="mode public">PUBLIC vs AGENT RATE</div>

<div class="row"><span>999.9</span><span id="g9999">-</span></div>
<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>835</span><span id="g835">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>
<div class="row"><span>585</span><span id="g585">-</span></div>
<div class="row"><span>375</span><span id="g375">-</span></div>

<select id="karat" onchange="kira()">
<option value="g916" selected>916</option>
<option value="g9999">999.9</option>
<option value="g999">999</option>
<option value="g835">835</option>
<option value="g750">750</option>
<option value="g585">585</option>
<option value="g375">375</option>
</select>

<input type="number" id="berat" placeholder="Masukkan berat (g)" oninput="kira()">

<div class="result">RM <span id="total">0.00</span></div>

<button class="refresh" onclick="harga()">REFRESH</button>
<button class="agentBtn" onclick="toggleAgent()">AGENT</button>

</div>

<script>
let agentMode=false
let lastPrice={}

// TOGGLE AGENT
function toggleAgent(){
agentMode=!agentMode
harga()
}

// FETCH MKS STYLE
async function harga(){

document.getElementById("status").innerHTML="Updating MKS..."

try{
// GOLD SPOT
let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()
let usd=data.price

// FX LIVE
let fx=await fetch("https://api.exchangerate-api.com/v4/latest/USD")
let fxData=await fx.json()
let rate=fxData.rates.MYR

// MKS FORMULA
let rm=(usd*rate)/31.1035

process(rm)

document.getElementById("status").innerHTML="MKS Live ✔"
document.getElementById("spot").innerHTML=
"Spot: "+usd.toFixed(2)+" USD | MYR: "+rate.toFixed(2)

}catch{

// BACKUP
let rm=650
process(rm)
document.getElementById("status").innerHTML="Backup Mode ⚠"

}

}

// CALC
function calc(base,k,spread){
return (base*k)-spread
}

// PROCESS (ALL KARAT)
function process(rm){

// SPREAD SYSTEM (MKS STYLE DEALER)
let basePublic=rm*0.88
let baseAgent=rm*0.95

let spread={
g9999:20,g999:20,g916:26.4,g835:35,g750:35,g585:35,g375:45
}

let purity={
g9999:0.999,
g999:0.994,
g916:0.916,
g835:0.835,
g750:0.750,
g585:0.585,
g375:0.375
}

Object.keys(purity).forEach(id=>{

let pub=calc(basePublic,purity[id],spread[id])
let ag =calc(baseAgent,purity[id],spread[id])+15

updateHarga(id,pub,ag)

})

document.getElementById("lastUpdate").innerHTML=
"Update: "+new Date().toLocaleTimeString()

}

// UPDATE + ARROW
function updateHarga(id,pub,ag){

let el=document.getElementById(id)
let current=agentMode?ag:pub
let old=lastPrice[id]

let arrow="",cls=""

if(old!==undefined){
if(current>old){arrow=" ↑";cls="up"}
else if(current<old){arrow=" ↓";cls="down"}
}

// DISPLAY DUAL
el.innerHTML=
"<span class='strike'>"+pub.toFixed(2)+"</span>"+
"<span class='"+cls+"'> "+ag.toFixed(2)+arrow+"</span>"

lastPrice[id]=current
}

// KIRA
function kira(){
let berat=document.getElementById("berat").value
let karat=document.getElementById("karat").value

let text=document.getElementById(karat).innerText
let rate=parseFloat(text.replace(/[^\d.]/g,''))||0

document.getElementById("total").innerHTML=(berat*rate).toFixed(2)
}

// AUTO REFRESH
setInterval(harga,10000)

// START
harga()
</script>

</body>
</html>
