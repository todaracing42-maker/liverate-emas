</style></head><body><div class="logo">HYNGOLD</div><div class="subtitle">LIVE RATE EMAS</div><div class="board"><div class="time" id="time"></div><div class="row"><span>999.9</span><span class="price" id="g9999">-</span></div>
<div class="row"><span>999</span><span class="price" id="g999">-</span></div>
<div class="row"><span>916</span><span class="price" id="g916">-</span></div>
<div class="row"><span>835</span><span class="price" id="g835">-</span></div>
<div class="row"><span>750</span><span class="price" id="g750">-</span></div>
<div class="row"><span>585</span><span class="price" id="g585">-</span></div>
<div class="row"><span>375</span><span class="price" id="g375">-</span></div><a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a><div class="ticker">
<span>HYNGOLD LIVE RATE | Harga emas berubah setiap 5 saat | Jual beli emas terbaik</span>
</div></div><script>

let lastPrice=0;

function masa(){

let now=new Date();

let hari=["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"];

let h=hari[now.getDay()];
let t=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();
let m=now.toLocaleTimeString();

document.getElementById("time").innerHTML=h+" | "+t+" | "+m;

}

setInterval(masa,1000);



async function harga(){

try{

let res=await fetch("https://api.gold-api.com/price/XAU");

let data=await res.json();

let usd=data.price;

let rm=(usd*4.35)/31.1035;

let base=rm*0.92;

let arrowClass="";

if(base>lastPrice){arrowClass="up";}
if(base<lastPrice){arrowClass="down";}

lastPrice=base;



let g9999=base-22;
let g999=(base*0.999)-24;
let g916=(base*0.916)-20;
let g835=(base*0.835)-26;
let g750=(base*0.750)-25;
let g585=(base*0.585)-24;
let g375=(base*0.375)-26;



function setPrice(id,val){

let el=document.getElementById(id);

el.innerHTML="RM "+val.toFixed(2)+"/g";

el.className="price "+arrowClass;

}

setPrice("g9999",g9999);
setPrice("g999",g999);
setPrice("g916",g916);
setPrice("g835",g835);
setPrice("g750",g750);
setPrice("g585",g585);
setPrice("g375",g375);

}catch(err){

console.log("API error");

}

}

harga();

setInterval(harga,5000);

</script></body>
</html>
