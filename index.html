<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYNGOLD LIVE</title>

<style>
body{
margin:0;
font-family:Arial;
color:#ffd700;
text-align:center;
background:url("https://images.unsplash.com/photo-1610375461246-83df859d849d");
background-size:cover;
height:100vh;
}

.box{
width:90%;
max-width:420px;
margin:auto;
margin-top:60px;
background:rgba(0,0,0,0.9);
padding:25px;
border-radius:18px;
box-shadow:0 0 20px gold;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #333;
font-size:20px;
}

.up{color:#00ff90;}
.down{color:#ff4d4d;}

.modebtn{
padding:8px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#333;
color:#fff;
}

.active{
background:#ffd700;
color:#000;
}

input{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
width:80%;
text-align:center;
}

.result{
margin-top:10px;
background:#ffd700;
color:#000;
padding:10px;
border-radius:10px;
font-size:22px;
}

.ticker{
position:fixed;
bottom:0;
width:100%;
background:black;
color:gold;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 15s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="box">

<h2>HYNGOLD LIVE</h2>

<button class="modebtn active" onclick="setMode('buy',this)">WE BUY</button>
<button class="modebtn" onclick="setMode('sell',this)">WE SELL</button>

<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>

<input type="number" id="berat" placeholder="Masukkan berat (g)" oninput="kira()">

<div class="result" id="total">RM 0.00</div>

</div>

<div class="ticker">
<span id="tickertext">LIVE HYNGOLD</span>
</div>

<script>

let mode="buy"
let rate916=0
let lastRate={}

// MODE
function setMode(m,el){
mode=m
document.querySelectorAll(".modebtn").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
harga()
}

// FETCH (ADA BACKUP)
async function harga(){

try{
let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let rm=(data.price*4.35)/31.1035
process(rm)

}catch{
process(450) // fallback
}

}

// PROCESS
function process(rm){

let base=rm*0.92

let g999=(base*0.999)-20
let g916=(base*0.916)-26
let g750=(base*0.750)-35

if(mode=="sell"){
g999+=30
g916+=30
g750+=30
}

rate916=g916

update("g999",g999)
update("g916",g916)
update("g750",g750)

document.getElementById("tickertext").innerHTML=
"999 RM "+g999.toFixed(2)+" | 916 RM "+g916.toFixed(2)

}

// UPDATE
function update(id,value){

let el=document.getElementById(id)

let old=lastRate[id] || value
el.innerHTML="RM "+value.toFixed(2)+"/g"

if(value>old) el.className="up"
if(value<old) el.className="down"

lastRate[id]=value

}

// KIRA
function kira(){
let berat=document.getElementById("berat").value
let total=berat*rate916
document.getElementById("total").innerHTML="RM "+total.toFixed(2)
}

harga()
setInterval(harga,5000)

</script>

</body>
</html>
