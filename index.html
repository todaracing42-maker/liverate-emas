<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYNGOLD WE BUY</title>

<style>
body{
margin:0;
font-family:Arial;
color:#ffd700;
text-align:center;
background:url("https://images.unsplash.com/photo-1610375461246-83df859d849d");
background-size:cover;
height:100vh;
}

.box{
width:90%;
max-width:420px;
margin:auto;
margin-top:60px;
background:rgba(0,0,0,0.85);
padding:25px;
border-radius:18px;
box-shadow:0 0 10px gold,0 0 40px gold;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #333;
font-size:20px;
}

.up{color:#00ff90;}
.down{color:#ff4d4d;}

input,select{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
width:80%;
text-align:center;
}

.result{
margin-top:10px;
background:#ffd700;
color:#000;
padding:12px;
border-radius:10px;
font-size:22px;
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
background:#2ecc71;
color:white;
border-radius:8px;
}

.agent{background:#e67e22;}

.ticker{
position:fixed;
bottom:0;
width:100%;
background:black;
color:gold;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>

</head><body>

<div class="box">

<h2>HYNGOLD WE BUY</h2>

<div class="row"><span>999.9</span><span id="g9999">-</span></div>
<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>835</span><span id="g835">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>
<div class="row"><span>585</span><span id="g585">-</span></div>
<div class="row"><span>375</span><span id="g375">-</span></div>

<!-- AUTO KIRA -->
<select id="karat" onchange="kira()">
<option value="g9999">999.9</option>
<option value="g999">999</option>
<option value="g916" selected>916</option>
<option value="g835">835</option>
<option value="g750">750</option>
<option value="g585">585</option>
<option value="g375">375</option>
</select>

<input type="number" id="berat" placeholder="Masukkan berat (g)" oninput="kira()">

<div class="result">
RM <span id="total">0.00</span>
</div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

<button class="agent" onclick="login()">AGEN</button>

</div>

<div class="ticker">
<span id="tickertext">LIVE GOLD HYNGOLD</span>
</div>

<script>

let staff=false
let hargaSemasa={}

// LOGIN
function login(){
let pass=prompt("Masukkan Password Agen")
if(pass=="ALLAH"){
staff=true
alert("Agent Mode Aktif")
harga()
}else{
alert("Password Salah")
}
}

// FETCH HARGA
async function harga(){

try{
let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let rm=(data.price*4.35)/31.1035
process(rm)

}catch{
process(450) // fallback
}

}

function process(rm){

let base=rm*0.92

// PUBLIC
let g9999=(base*0.999)-20
let g999=(base*0.994)-20
let g916=(base*0.916)-26.4
let g835=(base*0.835)-35
let g750=(base*0.750)-35
let g585=(base*0.585)-35
let g375=(base*0.375)-45

// STAFF
if(staff){
g9999=(base*0.999)-15
g999=(base*0.994)-14
g916=(base*0.916)-17.69
g835=(base*0.835)-31
g750=(base*0.750)-30
g585=(base*0.585)-31
g375=(base*0.375)-35
}

update("g9999",g9999)
update("g999",g999)
update("g916",g916)
update("g835",g835)
update("g750",g750)
update("g585",g585)
update("g375",g375)

document.getElementById("tickertext").innerHTML=
"999 RM "+g999.toFixed(2)+" | 916 RM "+g916.toFixed(2)

}

// UPDATE + SIMPAN
function update(id,value){

let el=document.getElementById(id)

el.innerHTML="RM "+value.toFixed(2)+"/g"

hargaSemasa[id]=value

}

// KIRA (ANYGOLD STYLE)
function kira(){

let berat=document.getElementById("berat").value
let karat=document.getElementById("karat").value

let rate=hargaSemasa[karat] || 0

let total=berat * rate

document.getElementById("total").innerHTML=total.toFixed(2)

}

harga()
setInterval(harga,5000)

</script>

</body>
</html>
