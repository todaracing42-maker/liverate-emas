<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LIVE RATE EMAS</title>

<style>

body{
background:black;
color:gold;
font-family:Arial;
text-align:center;
}

.box{
width:350px;
margin:auto;
margin-top:50px;
background:#111;
padding:20px;
border-radius:10px;
}

.rate{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
font-size:18px;
}

</style>

</head>

<body>

<div class="box">

<h2>LIVE RATE EMAS</h2>

<p id="tarikh"></p>

<div class="rate"><span>999.9</span><span id="g9999"></span></div>
<div class="rate"><span>916</span><span id="g916"></span></div>
<div class="rate"><span>835</span><span id="g835"></span></div>
<div class="rate"><span>750</span><span id="g750"></span></div>
<div class="rate"><span>585</span><span id="g585"></span></div>
<div class="rate"><span>375</span><span id="g375"></span></div>

</div>

<script>

let base = 630;

document.getElementById("g9999").innerHTML="RM "+base+"/g";
document.getElementById("g916").innerHTML="RM "+(base*0.916).toFixed(2)+"/g";
document.getElementById("g835").innerHTML="RM "+(base*0.835).toFixed(2)+"/g";
document.getElementById("g750").innerHTML="RM "+(base*0.750).toFixed(2)+"/g";
document.getElementById("g585").innerHTML="RM "+(base*0.585).toFixed(2)+"/g";
document.getElementById("g375").innerHTML="RM "+(base*0.375).toFixed(2)+"/g";

let today=new Date();

document.getElementById("tarikh").innerHTML=
today.toLocaleDateString("ms-MY",{weekday:"long"})+" | "+
today.toLocaleDateString("ms-MY");

</script>

</body>
</html>
