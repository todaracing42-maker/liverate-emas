}

</style></head><body><div class="box" id="box"><h1 id="title">HYNGOLD WE BUY</h1><div id="mode" class="mode">PUBLIC MODE</div><div class="time" id="time"></div><div class="row"><span>999.9</span><span id="g9999">-</span></div>
<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>835</span><span id="g835">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>
<div class="row"><span>585</span><span id="g585">-</span></div>
<div class="row"><span>375</span><span id="g375">-</span></div><a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a><button class="agent" onclick="login()">AGEN</button>

</div><div class="ticker">
<span id="tickertext">LIVE GOLD PRICE HYNGOLD</span>
</div><script>

let staff=false

function login(){

let pass=prompt("Masukkan Password Agen")

if(pass=="ALLAHMAHABESAR"){

staff=true

document.body.classList.add("staff-body")

document.getElementById("box").classList.add("staff-box")

document.getElementById("title").innerHTML="HYNGOLD AGENT MODE"

document.getElementById("title").classList.add("staff-title")

document.getElementById("mode").innerHTML="STAFF PRICE"

document.getElementById("mode").classList.add("staff-label")

alert("Agent Mode Aktif")

harga()

}else{

alert("Password Salah")

}

}


// MASA
function masa(){

let now=new Date()

let hari=["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"]

let h=hari[now.getDay()]
let t=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear()
let m=now.toLocaleTimeString()

document.getElementById("time").innerHTML=h+" | "+t+" | "+m

}

setInterval(masa,1000)


// HARGA
async function harga(){

let res=await fetch("https://api.gold-api.com/price/XAU")

let data=await res.json()

let usd=data.price

let rm=(usd*4.35)/31.1035

let base=rm*0.92


// PUBLIC PRICE

let g9999=(base*0.999)-12
let g999=(base*0.994)-15
let g916=(base*0.916)-10
let g835=(base*0.835)-24
let g750=(base*0.750)-22
let g585=(base*0.585)-25
let g375=(base*0.375)-35


// STAFF PRICE

if(staff){

g9999=(base*0.999)-9
g999=(base*0.994)-12
g916=(base*0.916)-7
g835=(base*0.835)-21
g750=(base*0.750)-19
g585=(base*0.585)-21
g375=(base*0.375)-45

}


update("g9999",g9999)
update("g999",g999)
update("g916",g916)
update("g835",g835)
update("g750",g750)
update("g585",g585)
update("g375",g375)


document.getElementById("tickertext").innerHTML=
"999.9 RM "+g9999.toFixed(2)+" | 999 RM "+g999.toFixed(2)+" | 916 RM "+g916.toFixed(2)

}


function update(id,value){

let el=document.getElementById(id)

let old=parseFloat(el.innerText.replace("RM",""))

el.innerHTML="RM "+value.toFixed(2)+"/g"

if(value>old){
el.className="up"
}

if(value<old){
el.className="down"
}

}


harga()

setInterval(harga,5000)

</script></body>
</html>
