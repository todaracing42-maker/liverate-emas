<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE RATE EMAS</title>

<style>
body{
background:black;
color:gold;
font-family:Arial;
text-align:center;
}

.box{
width:350px;
margin:auto;
margin-top:80px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px gold;
}

.row{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #333;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#2ecc71;
color:white;
border-radius:6px;
font-size:16px;
}
</style>

</head>

<body>

<div class="box">

<h2>LIVE RATE EMAS</h2>

<div class="row"><span>999.9</span><span id="g9999">Loading...</span></div>
<div class="row"><span>999</span><span id="g999">Loading...</span></div>
<div class="row"><span>916</span><span id="g916">Loading...</span></div>
<div class="row"><span>835</span><span id="g835">Loading...</span></div>
<div class="row"><span>750</span><span id="g750">Loading...</span></div>
<div class="row"><span>585</span><span id="g585">Loading...</span></div>
<div class="row"><span>375</span><span id="g375">Loading...</span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

async function liveRate(){

try{

let res = await fetch("https://api.gold-api.com/price/XAU");
let data = await res.json();

let usd = data.price;

let rm = usd * 4.35 / 31.1035;

let base = rm * 0.92;

document.getElementById("g9999").innerText="RM "+base.toFixed(2)+"/g";
document.getElementById("g999").innerText="RM "+(base*0.999).toFixed(2)+"/g";
document.getElementById("g916").innerText="RM "+((base*0.916)-10).toFixed(2)+"/g";
document.getElementById("g835").innerText="RM "+((base*0.835)-30).toFixed(2)+"/g";
document.getElementById("g750").innerText="RM "+((base*0.750)-30).toFixed(2)+"/g";
document.getElementById("g585").innerText="RM "+((base*0.585)-30).toFixed(2)+"/g";
document.getElementById("g375").innerText="RM "+((base*0.375)-30).toFixed(2)+"/g";

}catch(e){

console.log("API error");

}

}

liveRate();
setInterval(liveRate,10000);

</script>

</body>
</html>
