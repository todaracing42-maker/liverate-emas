<!DOCTYPE html>
<html lang="ms">
<head>

<style>
body{

}

background:#111;

}

.row{
display:flex;

<body>

<div class="box">

<h2>LIVE RATE EMAS</h2>

<div class="row"><span>999.9</span><span id="g9999">Loading...</span></div>
<div class="row"><span>999</span><span id="g999">Loading...</span></div>
<div class="row"><span>916</span><span id="g916">Loading...</span></div>
<div class="row"><span>835</span><span id="g835">Loading...</span></div>
<div class="row"><span>750</span><span id="g750">Loading...</span></div>
<div class="row"><span>585</span><span id="g585">Loading...</span></div>
<div class="row"><span>375</span><span id="g375">Loading...</span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

async function liveRate(){

let res = await fetch("https://api.gold-api.com/price/XAU");
let data = await res.json();

let usd = data.price;

let rm = usd * 4.35 / 31.1035;

let mks = rm * 0.90;

let g9999 = mks;
let g999 = g9999 * 0.999;
let g916 = (g9999 * 0.916) - 10;
let g835 = (g9999 * 0.835) - 30;
let g750 = (g9999 * 0.750) - 30;
let g585 = (g9999 * 0.585) - 30;
let g375 = (g9999 * 0.375) - 30;

document.getElementById("g9999").innerHTML="RM "+g9999.toFixed(2)+"/g";
document.getElementById("g999").innerHTML="RM "+g999.toFixed(2)+"/g";
document.getElementById("g916").innerHTML="RM "+g916.toFixed(2)+"/g";
document.getElementById("g835").innerHTML="RM "+g835.toFixed(2)+"/g";
document.getElementById("g750").innerHTML="RM "+g750.toFixed(2)+"/g";
document.getElementById("g585").innerHTML="RM "+g585.toFixed(2)+"/g";
document.getElementById("g375").innerHTML="RM "+g375.toFixed(2)+"/g";

}

liveRate();
setInterval(liveRate,10000);

</script>

</body>
</html>
