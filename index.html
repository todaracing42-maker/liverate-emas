<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HYNGOLD LIVE RATE</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:#ffd700;
text-align:center;
}

.box{
width:90%;
max-width:420px;
margin:auto;
margin-top:40px;
background:#111;
padding:25px;
border-radius:15px;
box-shadow:0 0 30px gold;
}

h1{
margin-bottom:5px;
}

.mode{
font-size:14px;
color:#aaa;
margin-bottom:10px;
}

.time{
color:#ccc;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;

}

button{
margin-top:20px;

border:none;

}

</head>

<body>

<div class="box">

<h1>HYNGOLD LIVE RATE</h1>

<div class="mode" id="mode">WE BUY PRICE</div>

<div class="time" id="time"></div>

<div class="row"><span>999.9</span><span id="g9999">-</span></div>
<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>835</span><span id="g835">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>
<div class="row"><span>585</span><span id="g585">-</span></div>
<div class="row"><span>375</span><span id="g375">-</span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

let staff=false

// STAFF MODE
if(window.location.hash=="#staff"){

let pass=prompt("Masukkan Password Staff")

if(pass=="hyngold123"){
staff=true
document.getElementById("mode").innerHTML="STAFF PRICE"
}else{
alert("Akses Ditolak")
}

}


// MASA
function masa(){

let now=new Date()

let hari=["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"]

let h=hari[now.getDay()]
let t=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear()
let m=now.toLocaleTimeString()

document.getElementById("time").innerHTML=h+" | "+t+" | "+m

}

setInterval(masa,1000)



// HARGA
async function harga(){

let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let usd=data.price
let rm=(usd*4.35)/31.1035
let base=rm*0.92


// PUBLIC PRICE (SCRIPT ASAL TUAN)

let g9999=(base*0.999)-22
let g999=(base*0.994)-24
let g916=(base*0.916)-20
let g835=(base*0.835)-26
let g750=(base*0.750)-25
let g585=(base*0.585)-24
let g375=(base*0.375)-26


// STAFF PRICE
if(staff){

g9999=(base*0.999)
g999=(base*0.994)
g916=(base*0.916)
g835=(base*0.835)
g750=(base*0.750)
g585=(base*0.585)
g375=(base*0.375)

}


document.getElementById("g9999").innerHTML="RM "+g9999.toFixed(2)+"/g"
document.getElementById("g999").innerHTML="RM "+g999.toFixed(2)+"/g"
document.getElementById("g916").innerHTML="RM "+g916.toFixed(2)+"/g"
document.getElementById("g835").innerHTML="RM "+g835.toFixed(2)+"/g"
document.getElementById("g750").innerHTML="RM "+g750.toFixed(2)+"/g"
document.getElementById("g585").innerHTML="RM "+g585.toFixed(2)+"/g"
document.getElementById("g375").innerHTML="RM "+g375.toFixed(2)+"/g"

}

harga()

setInterval(harga,5000)

</script>

</body>
</html>
