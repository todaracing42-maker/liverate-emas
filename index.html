<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE RATE EMAS</title>

<style>

body{
background:black;
font-family:Arial;
color:gold;
text-align:center;
}

.box{
width:350px;
margin:auto;
margin-top:80px;
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px gold;
}

h1{
margin-bottom:5px;
}

.time{
font-size:14px;
margin-bottom:15px;
color:#ccc;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
font-size:18px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#2ecc71;
color:white;
font-size:16px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="box">

<h1>LIVE RATE EMAS</h1>

<div class="time" id="time">Loading...</div>

<div class="row"><span>999.9</span><span id="g9999">Loading...</span></div>
<div class="row"><span>999</span><span id="g999">Loading...</span></div>
<div class="row"><span>916</span><span id="g916">Loading...</span></div>
<div class="row"><span>835</span><span id="g835">Loading...</span></div>
<div class="row"><span>750</span><span id="g750">Loading...</span></div>
<div class="row"><span>585</span><span id="g585">Loading...</span></div>
<div class="row"><span>375</span><span id="g375">Loading...</span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

function updateTime(){

let now = new Date();

let hari = ["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"];

let d = hari[now.getDay()];
let tarikh = now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();

let masa = now.toLocaleTimeString();

document.getElementById("time").innerHTML=d+" | "+tarikh+" | "+masa;

}

setInterval(updateTime,1000);

async function liveRate(){

try{

let res = await fetch("https://api.gold-api.com/price/XAU");

let data = await res.json();

let usd = data.price;

let rmRate = 4.35;

let rmGram = (usd * rmRate) / 31.1035;

let mks = rmGram * 0.92;

let g9999 = mks;
let g999 = mks * 0.999;
let g916 = (mks * 0.916) - 10;
let g835 = (mks * 0.835) - 30;
let g750 = (mks * 0.750) - 30;
let g585 = (mks * 0.585) - 30;
let g375 = (mks * 0.375) - 30;

document.getElementById("g9999").innerHTML="RM "+g9999.toFixed(2)+"/g";
document.getElementById("g999").innerHTML="RM "+g999.toFixed(2)+"/g";
document.getElementById("g916").innerHTML="RM "+g916.toFixed(2)+"/g";
document.getElementById("g835").innerHTML="RM "+g835.toFixed(2)+"/g";
document.getElementById("g750").innerHTML="RM "+g750.toFixed(2)+"/g";
document.getElementById("g585").innerHTML="RM "+g585.toFixed(2)+"/g";
document.getElementById("g375").innerHTML="RM "+g375.toFixed(2)+"/g";

}catch(e){

console.log("API Error");

}

}

liveRate();

setInterval(liveRate,5000);

</script>

</body>
</html>
