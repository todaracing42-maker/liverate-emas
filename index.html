<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LIVE RATE EMAS MKS</title>

<style>

body{
background:black;
color:gold;
font-family:Arial;
text-align:center;
}

.box{
width:380px;
margin:auto;
margin-top:50px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px gold;
}

.rate{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
font-size:19px;
}

h2{
margin-bottom:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#25D366;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="box">

<h2>LIVE RATE EMAS</h2>

<p id="tarikh"></p>

<div class="rate"><span>999.9</span><span id="g9999"></span></div>
<div class="rate"><span>999</span><span id="g999"></span></div>
<div class="rate"><span>916</span><span id="g916"></span></div>
<div class="rate"><span>835</span><span id="g835"></span></div>
<div class="rate"><span>750</span><span id="g750"></span></div>
<div class="rate"><span>585</span><span id="g585"></span></div>
<div class="rate"><span>375</span><span id="g375"></span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

async function liveGold(){

let url="https://api.gold-api.com/price/XAU";

let res=await fetch(url);
let data=await res.json();

let usd=data.price;

let myr=usd/31.1035*4.35;

// adjustment hampir MKS
let mks=myr*0.98;

document.getElementById("g9999").innerHTML="RM "+mks.toFixed(2)+"/g";
document.getElementById("g999").innerHTML="RM "+(mks*0.999).toFixed(2)+"/g";
document.getElementById("g916").innerHTML="RM "+(mks*0.916)-10).toFixed(2)+"/g";
document.getElementById("g835").innerHTML="RM "+(mks*0.835)-30).toFixed(2)+"/g";
document.getElementById("g750").innerHTML="RM "+(mks*0.750)-30).toFixed(2)+"/g";
document.getElementById("g585").innerHTML="RM "+(mks*0.585)-30).toFixed(2)+"/g";
document.getElementById("g375").innerHTML="RM "+(mks*0.375)-30).toFixed(2)+"/g";

}

liveGold();

setInterval(liveGold,60000);

let today=new Date();

document.getElementById("tarikh").innerHTML=
today.toLocaleDateString("ms-MY",{weekday:"long"})+" | "+
today.toLocaleDateString("ms-MY");

</script>

</body>
</html>
