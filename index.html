<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYNGOLD WE BUY</title>

<style>
body{
margin:0;
font-family:Arial;
color:#ffd700;
text-align:center;
background:url("https://images.unsplash.com/photo-1610375461246-83df859d849d");
background-size:cover;
height:100vh;
}

.box{
width:90%;
max-width:420px;
margin:auto;
margin-top:60px;
background:rgba(0,0,0,0.85);
padding:25px;
border-radius:18px;
box-shadow:0 0 10px gold,0 0 40px gold;
}

.time{color:#ccc;font-size:14px;}
.status{font-size:12px;color:#aaa;}
.last{font-size:11px;color:#777;margin-bottom:10px;}

.row{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #333;
font-size:20px;
}

.up{color:#00ff90;}
.down{color:#ff4d4d;}

input,select{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
width:80%;
text-align:center;
}

.result{
margin-top:10px;
background:#ffd700;
color:#000;
padding:12px;
border-radius:10px;
font-size:22px;
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
background:#2ecc71;
color:white;
border-radius:8px;
}

.agent{background:#e67e22;}

.staff-body{
background:linear-gradient(#000,#2a0000,#000);
}

.staff-box{
box-shadow:0 0 20px red;
}
</style>
</head>

<body>

<div class="box" id="box">

<h2 id="title">
HYNGOLD<br>
<span style="font-size:14px;color:#ccc">
WE BUY GOLD AT HIGHEST PRICE
</span>
</h2>

<div class="time" id="time"></div>
<div class="status" id="status">Connecting...</div>
<div class="last" id="lastUpdate"></div>

<div class="row"><span>999.9</span><span id="g9999">-</span></div>
<div class="row"><span>999</span><span id="g999">-</span></div>
<div class="row"><span>916</span><span id="g916">-</span></div>
<div class="row"><span>835</span><span id="g835">-</span></div>
<div class="row"><span>750</span><span id="g750">-</span></div>
<div class="row"><span>585</span><span id="g585">-</span></div>
<div class="row"><span>375</span><span id="g375">-</span></div>

<select id="karat" onchange="kira()">
<option value="g9999">999.9</option>
<option value="g999">999</option>
<option value="g916" selected>916</option>
<option value="g835">835</option>
<option value="g750">750</option>
<option value="g585">585</option>
<option value="g375">375</option>
</select>

<input type="number" id="berat" placeholder="Masukkan berat (g)" oninput="kira()">

<div class="result">
RM <span id="total">0.00</span>
</div>

<button onclick="manualRefresh()">REFRESH</button>
<button class="agent" onclick="login()">AGEN</button>

</div>

<script>

let staff=false
let hargaSemasa={}
let lastFetch=0

// MASA
function masa(){
let now=new Date()
let hari=["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"]

let h=hari[now.getDay()]
let t=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear()
let m=now.toLocaleTimeString()

document.getElementById("time").innerHTML=h+" | "+t+" | "+m

// AUTO RESET AGENT (9am - 8pm sahaja)
let hour=now.getHours()
if(hour < 9 || hour >= 20){
staff=false
document.body.classList.remove("staff-body")
document.getElementById("box").classList.remove("staff-box")
}
}
setInterval(masa,1000)

// LOGIN
function login(){
let pass=prompt("Password Agen")
if(pass==="HYNGOLD2026"){
staff=true

document.body.classList.add("staff-body")
document.getElementById("box").classList.add("staff-box")

document.getElementById("title").innerHTML=
"HYNGOLD AGENT MODE AKTIF"

harga()
}
}

// FETCH HARGA
async function harga(){

document.getElementById("status").innerHTML="Updating..."

try{

let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let usd=data.price
if(!usd) throw "error"

let rm=(usd*4.7)/31.1035

process(rm)

document.getElementById("status").innerHTML="Live ✔"

}catch{

// fallback
process(460)
document.getElementById("status").innerHTML="API Error ⚠"

}

}

// PROCESS
function process(rm){

let spread = staff ? 0.95 : 0.90
let base=rm*spread

let g9999=(base*0.999)-20
let g999=(base*0.994)-20
let g916=(base*0.916)-56
let g835=(base*0.835)-35
let g750=(base*0.750)-35
let g585=(base*0.585)-35
let g375=(base*0.375)-45

if(staff){
g9999+=0
g999+=0
g916+=0
g835+=0
g750+=0
g585+=0
g375+=-38
}

update("g9999",g9999)
update("g999",g999)
update("g916",g916)
update("g835",g835)
update("g750",g750)
update("g585",g585)
update("g375",g375)

// last update
document.getElementById("lastUpdate").innerHTML=
"Last Update: "+new Date().toLocaleTimeString()

}

// UPDATE UI
function update(id,value){

let el=document.getElementById(id)
let old=hargaSemasa[id]

let arrow=""

if(old !== undefined){
if(value > old){
el.className="up"
arrow=" ↑"
}else if(value < old){
el.className="down"
arrow=" ↓"
}else{
el.className=""
}
}

el.innerHTML="RM "+value.toFixed(2)+"/g"+arrow

hargaSemasa[id]=value

}

// KIRA
function kira(){
let berat=document.getElementById("berat").value
let karat=document.getElementById("karat").value
let rate=hargaSemasa[karat] || 0
let total=berat * rate
document.getElementById("total").innerHTML=total.toFixed(2)
}

// AUTO REFRESH SMART
function autoRefresh(){
let now=Date.now()
let delay = staff ? 5000 : 10000

if(now - lastFetch > delay){
harga()
lastFetch=now
}
}
setInterval(autoRefresh,1000)

// MANUAL REFRESH
function manualRefresh(){
harga()
}

// START
harga()

</script>

</body>
</html>
