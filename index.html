<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYNGOLD WE BUY</title>

<style>
body{
margin:0;
font-family:Arial;
color:#ffd700;
text-align:center;
background:#000;
}

.box{
width:90%;
max-width:420px;
margin:auto;
margin-top:20px;
background:rgba(0,0,0,0.9);
padding:15px;
border-radius:18px;
box-shadow:0 0 10px gold,0 0 40px gold;
}

/* GAMBAR KEDAI */
.shop-img{
width:100%;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 0 10px gold;
}

/* MODE BADGE */
.mode-badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-top:5px;
}
.public{background:#555;color:#fff;}
.agent-mode{background:#e74c3c;color:#fff;}

.banner{font-size:12px;color:#ccc;margin-bottom:5px;}
.agent-banner{color:#ff7675;}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
font-size:18px;
}

.agent-row{
background:rgba(255,0,0,0.08);
border-left:3px solid red;
}

.strike{
text-decoration:line-through;
color:#999;
font-size:12px;
margin-right:5px;
}

input,select{
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
width:80%;
text-align:center;
}

.result{
margin-top:10px;
background:#ffd700;
color:#000;
padding:10px;
border-radius:10px;
font-size:22px;
}

button{
margin-top:8px;
padding:10px 20px;
border:none;
background:#2ecc71;
color:white;
border-radius:8px;
}

.agent{background:#e67e22;}

/* CHART */
#chartWrap{
margin-top:15px;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px gold;
}

#tv_chart{
width:100%;
height:300px;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
background:#000;
}

.fullscreen #tv_chart{
height:100vh;
}
</style>
</head>

<body>

<div class="box">

<!-- GAMBAR KEDAI -->
<img src="URL_GAMBAR_KEDAI" class="shop-img">

<h2>HYNGOLD</h2>

<div id="modeBadge" class="mode-badge public">PUBLIC MODE</div>
<div id="modeBanner" class="banner">Harga biasa pelanggan</div>

<div id="time"></div>
<div id="status">Connecting...</div>
<div id="lastUpdate"></div>

<div class="row"><span>999.9</span><span id="g9999"></span></div>
<div class="row"><span>999</span><span id="g999"></span></div>
<div class="row"><span>916</span><span id="g916"></span></div>
<div class="row"><span>835</span><span id="g835"></span></div>
<div class="row"><span>750</span><span id="g750"></span></div>
<div class="row"><span>585</span><span id="g585"></span></div>
<div class="row"><span>375</span><span id="g375"></span></div>

<select id="karat" onchange="kira()">
<option value="g9999">999.9</option>
<option value="g999">999</option>
<option value="g916" selected>916</option>
<option value="g835">835</option>
<option value="g750">750</option>
<option value="g585">585</option>
<option value="g375">375</option>
</select>

<input type="number" id="berat" placeholder="Masukkan berat (g)" oninput="kira()">

<div class="result">RM <span id="total">0.00</span></div>

<button onclick="harga()">REFRESH</button>
<button onclick="toggleChart()">FULL CHART</button>
<button class="agent" onclick="login()">AGEN</button>

<div id="chartWrap">
<div id="tv_chart"></div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let staff=false

function masa(){
document.getElementById("time").innerHTML=new Date().toLocaleString()
}
setInterval(masa,1000)

function login(){
let pass=prompt("Password Agen")
if(pass==="12340"){
staff=true
updateModeUI()
harga()
}
}

function updateModeUI(){
let badge=document.getElementById("modeBadge")
let banner=document.getElementById("modeBanner")
let rows=document.querySelectorAll(".row")

if(staff){
badge.className="mode-badge agent-mode"
badge.innerHTML="AGENT MODE"
banner.className="banner agent-banner"
banner.innerHTML="Harga khas agent"
rows.forEach(r=>r.classList.add("agent-row"))
}else{
badge.className="mode-badge public"
badge.innerHTML="PUBLIC MODE"
banner.className="banner"
banner.innerHTML="Harga biasa"
rows.forEach(r=>r.classList.remove("agent-row"))
}
}

async function harga(){
document.getElementById("status").innerHTML="Updating..."

try{
let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let rm=(data.price*4.7)/31.1035
process(rm)

document.getElementById("status").innerHTML="Live ✔"
}catch{
process(460)
document.getElementById("status").innerHTML="API Error"
}
}

function calc(base,k,minus,bonus=0){
return (base*k)-minus+bonus
}

function process(rm){

let basePublic=rm*0.90
let baseAgent=rm*0.95

let pub={
g9999:calc(basePublic,0.999,20),
g999:calc(basePublic,0.994,20),
g916:calc(basePublic,0.916,26.4),
g835:calc(basePublic,0.835,35),
g750:calc(basePublic,0.750,35),
g585:calc(basePublic,0.585,35),
g375:calc(basePublic,0.375,45)
}

let ag={
g9999:calc(baseAgent,0.999,20,5),
g999:calc(baseAgent,0.994,20,6),
g916:calc(baseAgent,0.916,26.4,7.98),
g835:calc(baseAgent,0.835,35,8),
g750:calc(baseAgent,0.750,35,10),
g585:calc(baseAgent,0.585,35,10),
g375:calc(baseAgent,0.375,45,12)
}

Object.keys(pub).forEach(id=>{
let el=document.getElementById(id)

if(staff){
el.innerHTML="<span class='strike'>RM "+pub[id].toFixed(2)+"</span> RM "+ag[id].toFixed(2)+"/g"
}else{
el.innerHTML="RM "+pub[id].toFixed(2)+"/g"
}
})

document.getElementById("lastUpdate").innerHTML="Update: "+new Date().toLocaleTimeString()
}

function kira(){
let berat=document.getElementById("berat").value
let karat=document.getElementById("karat").value

let text=document.getElementById(karat).innerText
let rate=parseFloat(text.replace(/[^\d.]/g,'')) || 0

document.getElementById("total").innerHTML=(berat*rate).toFixed(2)
}

function loadChart(){
new TradingView.widget({
width:"100%",
height:"100%",
symbol:"OANDA:XAUUSD",
interval:"15",
theme:"dark",
container_id:"tv_chart"
})
}

function toggleChart(){
document.getElementById("chartWrap").classList.toggle("fullscreen")
}

harga()
loadChart()
</script>

</body>
</html>
