<body>

<div class="box">

<h1>HYNGOLD LIVE RATE</h1>

<div style="font-size:13px;color:#aaa;margin-bottom:10px;">
LIVE GOLD PRICE MALAYSIA
</div>

<div class="time" id="time"></div>

<div class="head">
<span>EMAS</span>
<span>WE BUY</span>
<span>WE SELL</span>
</div>

<div class="row"><span>999.9</span><span id="b9999">-</span><span id="s9999">-</span></div>
<div class="row"><span>999</span><span id="b999">-</span><span id="s999">-</span></div>
<div class="row"><span>916</span><span id="b916">-</span><span id="s916">-</span></div>
<div class="row"><span>835</span><span id="b835">-</span><span id="s835">-</span></div>
<div class="row"><span>750</span><span id="b750">-</span><span id="s750">-</span></div>
<div class="row"><span>585</span><span id="b585">-</span><span id="s585">-</span></div>
<div class="row"><span>375</span><span id="b375">-</span><span id="s375">-</span></div>

<a href="https://www.wasap.my/60143005979">
<button>WHATSAPP KAMI</button>
</a>

</div>

<script>

let lastPrice=0


function masa(){

let now=new Date()

let hari=["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"]

let h=hari[now.getDay()]
let t=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear()
let m=now.toLocaleTimeString()

document.getElementById("time").innerHTML=h+" | "+t+" | "+m

}

setInterval(masa,1000)



async function harga(){

let res=await fetch("https://api.gold-api.com/price/XAU")
let data=await res.json()

let usd=data.price

let rm=(usd*4.35)/31.1035

let base=rm*0.92


let b9999=(base*0.999)-22
let b999=(base*0.994)-24
let b916=(base*0.916)-20
let b835=(base*0.835)-26
let b750=(base*0.750)-25
let b585=(base*0.585)-24
let b375=(base*0.375)-26


let s9999=b9999+25
let s999=b999+25
let s916=b916+25
let s835=b835+25
let s750=b750+25
let s585=b585+25
let s375=b375+25


update("b9999",b9999)
update("b999",b999)
update("b916",b916)
update("b835",b835)
update("b750",b750)
update("b585",b585)
update("b375",b375)

update("s9999",s9999)
update("s999",s999)
update("s916",s916)
update("s835",s835)
update("s750",s750)
update("s585",s585)
update("s375",s375)

}

function update(id,value){

let el=document.getElementById(id)

let old=parseFloat(el.innerText.replace("RM",""))

el.innerHTML="RM "+value.toFixed(2)

if(value>old){
el.className="up"
}

if(value<old){
el.className="down"
}

}

harga()

setInterval(harga,5000)

</script>
